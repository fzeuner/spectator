[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "spectator"
version = "0.1.0"
description = "Spectator visualization components for THEMIS data"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Windsurf THEMIS", email = "noreply@example.com" }]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["spectator*"]
